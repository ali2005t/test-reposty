<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الموقع تحت الصيانة - Ta3leemy</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Tajawal', sans-serif;
        }

        .maintenance-card {
            text-align: center;
            padding: 40px;
            background: #1e293b;
            border-radius: 16px;
            border: 1px solid #334155;
            max-width: 500px;
            width: 90%;
        }

        .icon-box {
            font-size: 4rem;
            color: #f59e0b;
            margin-bottom: 20px;
        }

        h1 {
            margin: 10px 0;
        }

        p {
            color: #94a3b8;
            line-height: 1.6;
        }
    </style>
</head>

<body>
    <div class="maintenance-card">
        <div class="icon-box"><i class="fas fa-tools"></i></div>
        <h1>نجري بعض التحسينات</h1>
        <p>نقوم حالياً بعمل صيانة دورية للموقع لتقديم تجربة أفضل لكم.<br>سنعود للعمل قريباً جداً.</p>

    </div>
</body>

</html>
